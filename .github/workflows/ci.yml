name: CI

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Lint, Type Check, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Check Home Assistant dependency is latest non-beta
        run: scripts/check_homeassistant_current.sh

      - name: Code quality checks
        run: uv run poe check

      - name: Run tests with coverage
        run: |
          uv run pytest tests \
            --cov=custom_components/hubitat \
            --cov-branch \
            --cov-report=json:"$RUNNER_TEMP/pr-coverage.json" \
            --cov-report=markdown:"$RUNNER_TEMP/pr-coverage.md" \
            --cov-report=term-missing

      - name: Compute base branch coverage
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          BASE_DIR="$RUNNER_TEMP/base"
          git worktree add --detach "$BASE_DIR" "$BASE_SHA"
          cd "$BASE_DIR"
          uv sync --frozen
          uv run --with pytest-cov pytest tests \
            --cov=custom_components/hubitat \
            --cov-branch \
            --cov-report=json:"$RUNNER_TEMP/base-coverage.json" \
            --cov-report=term

      - name: Publish coverage report
        uses: actions/github-script@v9
        with:
          script: |
            const { updateCoverage } =
              await import('${{ github.workspace }}/.github/scripts/coverage-report.mjs');
            await updateCoverage({
              prCoverageJson: "${{ runner.temp }}/pr-coverage.json",
              prCoverageMarkdown: "${{ runner.temp }}/pr-coverage.md",
              baseCoverageJson: "${{ runner.temp }}/base-coverage.json",
              core,
              context,
              github
            });

  resolve-smoke-versions:
    name: Resolve Smoke Test Versions
    needs: test
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Resolve Home Assistant versions
        id: resolve
        run: uv run python scripts/resolve_smoke_versions.py --github-output >> "$GITHUB_OUTPUT"

  smoke-test:
    name: Smoke Test (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: resolve-smoke-versions
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-smoke-versions.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker
        uses: docker/setup-docker-action@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Hubitat smoke test
        run: uv run poe smoke --ha-version "${{ matrix.ha_version }}"

