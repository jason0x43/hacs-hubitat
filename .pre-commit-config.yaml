repos:
- repo: local
  hooks:
  - id: lint
    name: lint
    entry: uv run task lint
    language: system
    types: [python]
    require_serial: true
    files: ^(custom_components|tests)/.+\.py$
- repo: local
  hooks:
  - id: check
    name: check
    entry: uv run task check
    language: system
    types: [python]
    require_serial: true
    files: ^(custom_components|tests)/.+\.pyi?$
